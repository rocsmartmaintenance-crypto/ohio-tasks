<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>70 Ohio Street</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Nunito:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --joe:#2980d9;--joe-l:#dbeeff;--joe-g:rgba(41,128,217,.35);
  --kristy:#c0392b;--kristy-l:#fde8e2;--kristy-g:rgba(192,57,43,.3);
  --both:#27ae60;--both-l:#d6f0e2;--both-g:rgba(39,174,96,.3);
  --hbg:#0d1117;--hcard:#1a2235;--hcard2:#1e2a3a;--hborder:rgba(255,255,255,.08);--htext:#e8edf5;--hmuted:#6a80a0;
  --rbg:#f5efe6;--rcard:#fffdf8;--rborder:#e8ddd0;--rtext:#2d2416;--rmuted:#8a7a6a;--racc:#c8893a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--hbg);}
#cc{position:fixed;inset:0;pointer-events:none;z-index:9999;}
.sb{position:fixed;top:0;left:0;right:0;z-index:998;height:3px;}
.sb.syn{background:linear-gradient(90deg,#2980d9,#5dda96,#2980d9);background-size:200%;animation:sp 1s linear infinite;}
.sb.ok{background:#5dda96;animation:fo 2s forwards;}
.sb.err{background:#e53e3e;}
@keyframes sp{to{background-position:200%;}}
@keyframes fo{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
.pill{position:fixed;top:9px;right:12px;z-index:999;font-size:.55rem;font-family:'Nunito',sans-serif;text-transform:uppercase;letter-spacing:.1em;padding:3px 9px;border-radius:20px;background:rgba(0,0,0,.7);color:#5dda96;backdrop-filter:blur(8px);border:1px solid rgba(93,218,150,.2);}
.pill.off{color:#fc8181;border-color:rgba(252,129,129,.2);}
.pill.syn{color:#fbd38d;border-color:rgba(251,211,141,.2);}
.screen{display:none;min-height:100vh;}.screen.active{display:block;}

/* HOME */
#sh{background:var(--hbg);}
.hero{position:relative;height:210px;overflow:hidden;}
.hp{position:absolute;inset:0;background-size:cover;background-position:center 40%;transition:filter 2s;}
.ho{position:absolute;inset:0;transition:background 3s;pointer-events:none;}
#sc{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0;transition:opacity 2s;}
.moon{position:absolute;top:18px;right:28px;width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#fff8d0,#f0d060);box-shadow:0 0 18px 5px rgba(255,240,150,.3);opacity:0;transition:opacity 2s;}
.sun{position:absolute;top:20px;right:40px;width:32px;height:32px;border-radius:50%;background:radial-gradient(circle,#fff8c0,#ffcc00);box-shadow:0 0 28px 8px rgba(255,210,0,.4);opacity:0;transition:opacity 2s,top 2s,right 2s;}
.tlabel{position:absolute;top:10px;left:14px;font-size:.55rem;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.1em;font-family:'Nunito',sans-serif;text-shadow:0 1px 4px rgba(0,0,0,.6);}
.hero::after{content:'';position:absolute;bottom:-2px;left:-5%;right:-5%;height:42px;background:var(--hbg);border-radius:50% 50% 0 0/100% 100% 0 0;}
.ht{position:absolute;bottom:22px;left:0;right:0;text-align:center;z-index:2;}
.ht h1{font-family:'Playfair Display',serif;font-size:1.5rem;color:white;text-shadow:0 2px 16px rgba(0,0,0,.7);}
.ht h1 em{font-style:italic;color:#ffd97d;}
.hs{font-size:.57rem;color:rgba(255,255,255,.55);letter-spacing:.16em;text-transform:uppercase;margin-top:2px;font-family:'Nunito',sans-serif;}

/* HUD STATS */
.hud{display:flex;justify-content:center;gap:8px;padding:12px 12px 8px;}
.hs2{background:var(--hcard);border:1px solid var(--hborder);border-radius:14px;padding:8px 8px;text-align:center;flex:1;max-width:68px;box-shadow:0 4px 16px rgba(0,0,0,.35);}
.hn{font-family:'Nunito',sans-serif;font-size:1.25rem;font-weight:800;display:block;line-height:1;text-shadow:0 0 10px currentColor;}
.hl{font-size:.46rem;text-transform:uppercase;letter-spacing:.1em;color:var(--hmuted);margin-top:2px;display:block;font-family:'Nunito',sans-serif;}
.hn.joe{color:var(--joe);}.hn.kristy{color:var(--kristy);}.hn.both{color:var(--both);}.hn.tot{color:#e8edf5;}.hn.dn{color:#5dda96;}

/* GRID */
.gw{padding:4px 10px 30px;}
.fs{margin-bottom:10px;}
.fr{display:flex;align-items:center;gap:8px;margin:10px 0 7px;}
.frt{font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--hmuted);white-space:nowrap;}
.frl{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.1),transparent);}
.frc{font-size:.48rem;color:var(--hmuted);font-family:'Nunito',sans-serif;}
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}

/* ROOM CARD */
.rc{background:var(--hcard);border:1px solid var(--hborder);border-radius:14px;padding:9px 5px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;position:relative;overflow:hidden;transition:transform .12s,box-shadow .15s;box-shadow:0 4px 16px rgba(0,0,0,.4);}
.rc:active{transform:scale(.93);}
.rc::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:14px 14px 0 0;background:var(--hborder);}
.rc.joe::before{background:var(--joe);box-shadow:0 0 8px var(--joe-g);}
.rc.kristy::before{background:var(--kristy);box-shadow:0 0 8px var(--kristy-g);}
.rc.both::before{background:var(--both);box-shadow:0 0 8px var(--both-g);}
.rc.mixed::before{background:linear-gradient(90deg,var(--joe) 50%,var(--kristy) 50%);}
.rc.urg{border-color:rgba(220,53,69,.3);box-shadow:0 4px 16px rgba(220,53,69,.18);}
.rc.urg::after{content:'!';position:absolute;top:4px;right:6px;font-size:.58rem;color:#fc8181;font-family:'Nunito',sans-serif;font-weight:800;}
.riw{width:42px;height:42px;background:var(--hcard2);border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--hborder);overflow:hidden;}
.riw svg{width:34px;height:34px;}
.rn{font-size:.58rem;font-weight:700;text-align:center;line-height:1.2;color:var(--htext);font-family:'Nunito',sans-serif;}
.rbs{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;}
.rb{font-size:.44rem;padding:1.5px 5px;border-radius:6px;font-weight:700;font-family:'Nunito',sans-serif;}
.rb.due{background:rgba(220,53,69,.22);color:#fc8181;border:1px solid rgba(220,53,69,.28);}
.rb.ok{background:rgba(93,218,150,.16);color:#5dda96;border:1px solid rgba(93,218,150,.22);}
.rb.none{background:rgba(255,255,255,.05);color:var(--hmuted);}

/* ROOM SCREEN */
#sr{background:var(--rbg);}
.rhb{background:linear-gradient(135deg,#3d2c1e,#5a3e28);padding:44px 16px 20px;position:relative;overflow:hidden;}
.rhb::after{content:'';position:absolute;bottom:-2px;left:-5%;right:-5%;height:28px;background:var(--rbg);border-radius:50% 50% 0 0/100% 100% 0 0;}
.rhb::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M0 20 L20 0 L40 20 L20 40 Z'/%3E%3C/g%3E%3C/svg%3E");}
.bb{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 12px 5px 8px;color:white;font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:700;cursor:pointer;backdrop-filter:blur(4px);}
.rhc{display:flex;align-items:center;gap:10px;position:relative;z-index:1;margin-top:6px;}
.riw2{width:46px;height:46px;background:rgba(255,255,255,.12);border-radius:12px;border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.riw2 svg{width:34px;height:34px;}
.rit{font-family:'Playfair Display',serif;font-size:1.12rem;color:white;text-shadow:0 2px 8px rgba(0,0,0,.4);}
.ric{font-size:.58rem;color:rgba(255,255,255,.6);font-family:'Nunito',sans-serif;letter-spacing:.08em;text-transform:uppercase;}
.tw{padding:14px 14px 40px;}

/* ── STYLE B TASK CARDS: tap to expand ── */
.tc{background:var(--rcard);border:1.5px solid var(--rborder);border-radius:12px;margin-bottom:5px;position:relative;overflow:hidden;box-shadow:0 2px 6px rgba(45,36,22,.07);}
.tc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px;background:var(--rborder);}
.tc.aj::before{background:var(--joe);box-shadow:2px 0 6px var(--joe-g);}
.tc.ak::before{background:var(--kristy);box-shadow:2px 0 6px var(--kristy-g);}
.tc.ab::before{background:var(--both);box-shadow:2px 0 6px var(--both-g);}
.tc.dc{background:linear-gradient(135deg,#fffdf8,#f0f8ec);border-color:#c8e0b8;}

/* collapsed row — always visible */
.tc-row{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none;}
.tc-name{font-size:.82rem;font-weight:600;color:var(--rtext);font-family:'Nunito',sans-serif;flex:1;line-height:1.2;}
.tc-name.st{text-decoration:line-through;color:#b0a898;}
.tc-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.due-chip{font-size:.48rem;padding:2px 6px;border-radius:7px;font-weight:700;font-family:'Nunito',sans-serif;white-space:nowrap;}
.due-chip.ov{background:#fee2e2;color:#c0392b;}
.due-chip.sn{background:#fef3c7;color:#9a6700;}
.due-chip.gd{background:#d6f0e2;color:#27ae60;}
.own-chip{font-size:.48rem;padding:2px 6px;border-radius:7px;font-weight:700;font-family:'Nunito',sans-serif;white-space:nowrap;}
.own-chip.joe{background:var(--joe-l);color:var(--joe);}
.own-chip.kristy{background:var(--kristy-l);color:var(--kristy);}
.own-chip.both{background:var(--both-l);color:var(--both);}
.own-chip.none{background:#ede8df;color:#a09888;}
.chev{font-size:.55rem;color:#c0b0a0;transition:transform .18s;flex-shrink:0;}
.chev.open{transform:rotate(180deg);}

/* expanded panel */
.tc-expand{display:none;padding:0 12px 10px;border-top:1px dashed #ede4d8;}
.tc-expand.open{display:block;}
.ex-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;align-items:center;}
.ex-lbl{font-size:.52rem;text-transform:uppercase;letter-spacing:.08em;color:#a09888;font-family:'Nunito',sans-serif;font-weight:700;}
.xb{border:none;border-radius:8px;padding:5px 10px;font-size:.62rem;font-family:'Nunito',sans-serif;cursor:pointer;font-weight:700;transition:all .12s;}
.xb.joe{background:var(--joe-l);color:var(--joe);}.xb.joe.on{background:var(--joe);color:white;box-shadow:0 2px 6px var(--joe-g);}
.xb.kristy{background:var(--kristy-l);color:var(--kristy);}.xb.kristy.on{background:var(--kristy);color:white;box-shadow:0 2px 6px var(--kristy-g);}
.xb.both{background:var(--both-l);color:var(--both);}.xb.both.on{background:var(--both);color:white;box-shadow:0 2px 6px var(--both-g);}
.xb.cl{background:#ede8df;color:#a09888;}
.xb.mk{background:linear-gradient(135deg,#3d2c1e,#5a3e28);color:#ffd97d;font-weight:800;margin-left:auto;box-shadow:0 2px 8px rgba(61,44,30,.25);}
.xb.mk:active{transform:scale(.97);}
.xb.ud{background:#ede8df;color:#a09888;margin-left:auto;}
.ex-stamp{font-size:.54rem;color:#a09888;font-family:'Nunito',sans-serif;margin-top:5px;line-height:1.4;}
.ex-stamp strong{color:var(--rtext);font-weight:700;}
.ex-hist{margin-top:4px;}
.ex-hi{font-size:.52rem;color:#a09888;padding:1.5px 0;border-bottom:1px dashed #ede4d8;display:flex;justify-content:space-between;font-family:'Nunito',sans-serif;}
.ex-hi:last-child{border:none;}
.ex-pet{font-size:.48rem;padding:2px 6px;border-radius:7px;background:#fff3e0;color:#c77700;font-weight:700;font-family:'Nunito',sans-serif;}

.ntasks{text-align:center;padding:40px 20px;color:var(--rmuted);font-size:.85rem;font-family:'Nunito',sans-serif;}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;}
.sp{width:28px;height:28px;border:3px solid rgba(255,255,255,.1);border-top-color:#2980d9;border-radius:50%;animation:sp2 .8s linear infinite;}
.sp.w{border-color:#e8ddd0;border-top-color:var(--racc);}
@keyframes sp2{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<canvas id="cc"></canvas>
<div class="sb" id="sb"></div>
<div class="pill" id="pill">Connecting…</div>

<div class="screen active" id="sh">
  <div class="hero">
    <div class="hp" id="hp"></div>
    <canvas id="sc"></canvas>
    <div class="ho" id="ho"></div>
    <div class="moon" id="moon"></div>
    <div class="sun" id="sun"></div>
    <div class="tlabel" id="tl"></div>
    <div class="ht"><h1>70 Ohio Street</h1><div class="hs">Rochester, NY · Joe &amp; Kristy</div></div>
  </div>
  <div class="hud">
    <div class="hs2"><span class="hn tot" id="st">—</span><span class="hl">Total</span></div>
    <div class="hs2"><span class="hn joe" id="sj">—</span><span class="hl">Joe</span></div>
    <div class="hs2"><span class="hn kristy" id="sk">—</span><span class="hl">Kristy</span></div>
    <div class="hs2"><span class="hn both" id="sb2">—</span><span class="hl">Together</span></div>
    <div class="hs2"><span class="hn dn" id="sd">—</span><span class="hl">Done ✓</span></div>
  </div>
  <div class="gw" id="rg"><div class="ld"><div class="sp"></div></div></div>
</div>

<div class="screen" id="sr">
  <div class="rhb">
    <button class="bb" onclick="goHome()">← Home</button>
    <div class="rhc">
      <div class="riw2" id="ri"></div>
      <div><div class="rit" id="rt">Room</div><div class="ric" id="rc2"></div></div>
    </div>
  </div>
  <div class="tw" id="tl2"><div class="ld"><div class="sp w"></div></div></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue,update}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const app=initializeApp({apiKey:"AIzaSyD62UiiYzAkNWgn7XqUlwX4Lm_f4Hy2XLI",authDomain:"ohio-house-tasks.firebaseapp.com",databaseURL:"https://ohio-house-tasks-default-rtdb.firebaseio.com",projectId:"ohio-house-tasks",storageBucket:"ohio-house-tasks.firebasestorage.app",messagingSenderId:"471862416133",appId:"1:471862416133:web:5923ea05bddb453a049d6c"});
const db=getDatabase(app),tRef=ref(db,'tasks');

// TIME OF DAY
function tc(){
  const h=new Date().getHours(),m=new Date().getMinutes(),t=h+m/60;
  if(t>=5&&t<7)return{l:'🌅 Dawn',p:'golden',o:'linear-gradient(180deg,rgba(255,140,60,.3),rgba(255,80,20,.15) 50%,rgba(20,10,40,.45))',f:'brightness(.75) saturate(1.3) sepia(.2)',sun:true,sp:{top:'30px',right:'60px'},so:.7,moon:false,sa:0};
  if(t>=7&&t<11)return{l:'☀️ Morning',p:'day',o:'linear-gradient(180deg,rgba(135,206,235,.12),rgba(255,255,255,.04) 50%,rgba(10,25,50,.5))',f:'brightness(.9) saturate(1.15)',sun:true,sp:{top:'18px',right:'50px'},so:.85,moon:false,sa:0};
  if(t>=11&&t<14)return{l:'🌤️ Midday',p:'day',o:'linear-gradient(180deg,rgba(100,180,255,.08),transparent 40%,rgba(10,25,50,.45))',f:'brightness(1.0) saturate(1.1)',sun:true,sp:{top:'14px',right:'35px'},so:1,moon:false,sa:0};
  if(t>=14&&t<17)return{l:'🌇 Afternoon',p:'day',o:'linear-gradient(180deg,rgba(255,180,60,.1),rgba(255,140,40,.08) 50%,rgba(15,20,50,.55))',f:'brightness(.88) saturate(1.2) sepia(.08)',sun:true,sp:{top:'28px',right:'22px'},so:.8,moon:false,sa:0};
  if(t>=17&&t<19.5)return{l:'🌆 Golden Hour',p:'golden',o:'linear-gradient(180deg,rgba(255,100,20,.38),rgba(200,60,10,.22) 45%,rgba(30,10,60,.68))',f:'brightness(.78) saturate(1.5) sepia(.15)',sun:true,sp:{top:'48px',right:'18px'},so:.6,moon:false,sa:0};
  if(t>=19.5&&t<21)return{l:'🌃 Dusk',p:'night',o:'linear-gradient(180deg,rgba(40,20,80,.6),rgba(20,10,60,.48) 50%,rgba(5,5,30,.78))',f:'brightness(.65) saturate(1.2)',sun:false,so:0,moon:true,mo:.5,sa:.4};
  return{l:'🌙 Night',p:'night',o:'linear-gradient(180deg,rgba(5,8,30,.75),rgba(10,15,50,.52) 50%,rgba(5,5,25,.88))',f:'brightness(.55) saturate(.9)',sun:false,so:0,moon:true,mo:1,sa:1};
}
function drawStars(cv,op){
  const c=cv.getContext('2d');cv.width=cv.offsetWidth||800;cv.height=cv.offsetHeight||210;c.clearRect(0,0,cv.width,cv.height);
  if(op<=0)return;
  [[45,18,1],[78,32,.8],[120,12,1.1],[168,26,.7],[215,9,1],[268,22,.8],[325,14,1],[385,28,.7],[430,10,.9],[490,24,.8],[548,15,1.1],[612,30,.7],[664,8,1],[712,20,.8],[754,12,.9],[95,48,.6],[148,44,.8],[340,46,.7],[472,40,.6],[582,52,.8]].forEach(([x,y,r])=>{c.globalAlpha=op*(0.4+Math.random()*.6);c.fillStyle='white';c.beginPath();c.arc(x*cv.width/800,y*cv.height/210,r,0,Math.PI*2);c.fill();});c.globalAlpha=1;
}
function applyTime(){
  const cfg=tc();
  const urls={day:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=85&fit=crop',golden:'https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=1200&q=85&fit=crop',night:'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1200&q=85&fit=crop'};
  const p=document.getElementById('hp');p.style.backgroundImage=`url('${urls[cfg.p]}')`;p.style.filter=cfg.f;
  document.getElementById('ho').style.background=cfg.o;
  const s=document.getElementById('sun');s.style.opacity=cfg.sun?cfg.so:'0';if(cfg.sun){s.style.top=cfg.sp.top;s.style.right=cfg.sp.right;}
  document.getElementById('moon').style.opacity=cfg.moon?cfg.mo:'0';
  const sc=document.getElementById('sc');sc.style.opacity=cfg.sa;drawStars(sc,cfg.sa);
  const now=new Date();document.getElementById('tl').textContent=`${cfg.l} · ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
}
applyTime();setInterval(applyTime,60000);

// CELEBRATION
const cv=document.getElementById('cc'),cx=cv.getContext('2d');
function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}rsz();window.addEventListener('resize',rsz);
let parts=[],raf=null;
const COLS=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff','#ffd97d','#5dda96','#ff8c6b'];
function celebrate(type){
  parts=[];rsz();
  if(type==='dog'){for(let i=0;i<3;i++)parts.push({k:'e',e:'🐕',x:-80-i*120,y:window.innerHeight*(0.3+i*.2),vx:18+i*4,vy:-1+Math.random()*3,a:1,s:50+i*8,l:1});for(let i=0;i<45;i++)parts.push(fw('#ffb347'));}
  else if(type==='cat'){for(let i=0;i<2;i++)parts.push({k:'e',e:'🐈',x:-60-i*100,y:window.innerHeight*(0.25+i*.3),vx:14+i*3,vy:Math.random()*3,a:1,s:46,l:1});for(let i=0;i<35;i++)parts.push(fw('#c084fc'));}
  else if(type==='fish'){for(let i=0;i<3;i++)parts.push({k:'e',e:'🐟',x:-60-i*80,y:window.innerHeight*(0.4+i*.15),vx:10+i*2,vy:Math.sin(i)*2,a:1,s:42,l:1});for(let i=0;i<35;i++)parts.push(fw('#38bdf8'));}
  else{for(let i=0;i<100;i++)parts.push(fw(COLS[i%COLS.length]));}
  if(raf)cancelAnimationFrame(raf);anim();
  setTimeout(()=>{cancelAnimationFrame(raf);cx.clearRect(0,0,cv.width,cv.height);parts=[];},3500);
}
function fw(c){return{k:'f',x:Math.random()*cv.width,y:Math.random()*cv.height*.7,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,a:1,s:4+Math.random()*5,c,l:1};}

let LS={},CR=null;
onValue(tRef,(snap)=>{LS=snap.val()||{};setSt('ok');rHome();if(CR)rRoom(CR);},(e)=>setSt('err'));

function setSt(s){
  const b=document.getElementById('sb'),p=document.getElementById('pill');
  if(s==='ok'){b.className='sb ok';p.className='pill';p.textContent='● Live';}
  else if(s==='syn'){b.className='sb syn';p.className='pill syn';p.textContent='↑ Saving…';}
  else{b.className='sb err';p.className='pill off';p.textContent='✕ Offline';}
}
function gs(id){return LS[id]||{assigned:null,completions:[]};}
function isDone(id,t){const c=(gs(id).completions||[]);if(!c.length)return false;return(Date.now()-c[c.length-1].ts)/86400000<cd(t);}
function dueL(id,t){
  const c=(gs(id).completions||[]);if(!c.length)return{l:'Never done',cls:'ov'};
  const rem=cd(t)-((Date.now()-c[c.length-1].ts)/86400000);
  if(rem<=0)return{l:'Due now',cls:'ov'};
  if(rem<1)return{l:`${Math.round(rem*24)}h`,cls:'sn'};
  if(rem<=2)return{l:`${rem.toFixed(1)}d`,cls:'sn'};
  return{l:`${Math.ceil(rem)}d`,cls:'gd'};
}
function fmt(ts){return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
function urgScore(rid){let s=0;TD.filter(t=>t.r===rid).forEach(t=>{const c=(gs(t.id).completions||[]);if(!c.length){s-=10;return;}const p=(Date.now()-c[c.length-1].ts)/86400000/cd(t);if(p>=1)s-=5;else if(p>0.75)s-=2;});return s;}

function rHome(){
  updStats();
  const g=document.getElementById('rg');let html='';
  FS.forEach(sec=>{
    const sr=sec.r.map(id=>ROOMS.find(r=>r.id===id)).filter(Boolean);
    sr.sort((a,b)=>urgScore(a.id)-urgScore(b.id));
    html+=`<div class="fs"><div class="fr"><span class="frt">${sec.l}</span><div class="frl"></div><span class="frc">${sr.length}rm</span></div><div class="rg">`;
    sr.forEach(r=>{
      const rt=TD.filter(t=>t.r===r.id),total=rt.length;
      const done=rt.filter(t=>isDone(t.id,t)).length,due=total-done;
      const urg=urgScore(r.id)<-3;
      const ax=[...new Set(rt.map(t=>gs(t.id).assigned).filter(Boolean))];
      let cc=ax.length===1?ax[0]:ax.length>1?'mixed':'';
      html+=`<div class="rc ${cc} ${urg?'urg':''}" onclick="oRoom('${r.id}')"><div class="riw">${IC[r.id]||''}</div><div class="rn">${r.l}</div><div class="rbs">${done>0?`<span class="rb ok">✓${done}</span>`:''}${due>0?`<span class="rb due">⚠${due}</span>`:done===total&&total>0?`<span class="rb ok">✓</span>`:''}${done===0&&due===0?`<span class="rb none">${total}</span>`:''}</div></div>`;
    });
    html+='</div></div>';
  });
  g.innerHTML=html;
}
function updStats(){
  document.getElementById('st').textContent=TD.length;
  document.getElementById('sj').textContent=TD.filter(t=>gs(t.id).assigned==='joe').length;
  document.getElementById('sk').textContent=TD.filter(t=>gs(t.id).assigned==='kristy').length;
  document.getElementById('sb2').textContent=TD.filter(t=>gs(t.id).assigned==='both').length;
  document.getElementById('sd').textContent=TD.filter(t=>isDone(t.id,t)).length;
}

window.oRoom=function(rid){
  CR=rid;const r=ROOMS.find(x=>x.id===rid);
  document.getElementById('ri').innerHTML=IC[rid]||'';
  document.getElementById('rt').textContent=r.l;
  rRoom(rid);
  document.getElementById('sh').classList.remove('active');
  document.getElementById('sr').classList.add('active');
  window.scrollTo(0,0);
};
window.goHome=function(){CR=null;document.getElementById('sr').classList.remove('active');document.getElementById('sh').classList.add('active');window.scrollTo(0,0);};

function rRoom(rid){
  const tasks=TD.filter(t=>t.r===rid);
  document.getElementById('rc2').textContent=`${tasks.length} tasks`;
  const el=document.getElementById('tl2');
  if(!tasks.length){el.innerHTML='<div class="ntasks">No tasks here.</div>';return;}
  tasks.sort((a,b)=>(isDone(a.id,a)?1:0)-(isDone(b.id,b)?1:0));
  let html='';
  tasks.forEach(t=>{
    const s=gs(t.id),comps=s.completions||[],done=isDone(t.id,t);
    const last=comps.length?comps[comps.length-1]:null,due=dueL(t.id,t);
    const ac=s.assigned?`a${s.assigned[0]}`:'';
    const ownLabel=s.assigned?s.assigned.charAt(0).toUpperCase()+s.assigned.slice(1):'—';
    const ownCls=s.assigned||'none';
    const eid=`ex-${t.id}`;
    const cid=`ch-${t.id}`;
    html+=`<div class="tc ${ac} ${done?'dc':''}">
      <div class="tc-row" onclick="togEx('${eid}','${cid}')">
        <div class="tc-name ${done?'st':''}">${done?'✓ ':''}${t.n}</div>
        <div class="tc-right">
          <span class="due-chip ${due.cls}">${due.l}</span>
          <span class="own-chip ${ownCls}">${ownLabel}</span>
          ${t.pet?'<span class="ex-pet">🐾</span>':''}
          <span class="chev" id="${cid}">▾</span>
        </div>
      </div>
      <div class="tc-expand" id="${eid}">
        <div class="ex-row">
          <span class="ex-lbl">Owner:</span>
          <button class="xb joe ${s.assigned==='joe'?'on':''}" onclick="doA('${t.id}','joe')">Joe</button>
          <button class="xb kristy ${s.assigned==='kristy'?'on':''}" onclick="doA('${t.id}','kristy')">Kristy</button>
          <button class="xb both ${s.assigned==='both'?'on':''}" onclick="doA('${t.id}','both')">Together</button>
          ${s.assigned?`<button class="xb cl" onclick="doA('${t.id}','${s.assigned}')">Clear</button>`:''}
          ${!done
            ?`<button class="xb mk" onclick="doD('${t.id}','${t.c||'firework'}')">✓ Done</button>`
            :`<button class="xb ud" onclick="doU('${t.id}')">↩ Undo</button>`
          }
        </div>
        ${last
          ?`<div class="ex-stamp">Last: <strong>${last.who==='joe'?'Joe':'Kristy'}</strong> · ${fmt(last.ts)}</div>`
          :'<div class="ex-stamp" style="color:#c8b8a8">Never completed</div>'
        }
        ${comps.length>1?`<div class="ex-hist">${comps.slice(-4).reverse().slice(1).map(c=>`<div class="ex-hi"><span>${c.who==='joe'?'Joe':'Kristy'}</span><span>${fmt(c.ts)}</span></div>`).join('')}</div>`:''}
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

window.togEx=function(eid,cid){
  const ex=document.getElementById(eid),ch=document.getElementById(cid);
  if(!ex||!ch)return;
  ex.classList.toggle('open');
  ch.classList.toggle('open');
};

window.doA=function(id,who){const s=gs(id);setSt('syn');update(ref(db,'tasks/'+id),{assigned:s.assigned===who?null:who});};
window.doD=function(id,type){const s=gs(id);const who=s.assigned||'both';const entry={ts:Date.now(),who,date:new Date().toISOString()};const comps=[...(s.completions||[]),entry].slice(-6);setSt('syn');update(ref(db,'tasks/'+id),{completions:comps});celebrate(type||'firework');};
window.doU=function(id){const s=gs(id);const comps=[...(s.completions||[])];comps.pop();setSt('syn');update(ref(db,'tasks/'+id),{completions:comps});};
</script>
